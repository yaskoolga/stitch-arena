<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#FF8C42" opacity="0.15"/>

  <!-- Main cross-stitch X -->
  <path d="M25 25 L75 75 M75 25 L25 75" stroke="#FF8C42" stroke-width="8" stroke-linecap="round"/>

  <!-- Decorative stitches (smaller X's) -->
  <path d="M20 50 L30 60 M30 50 L20 60" stroke="#FF8C42" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <path d="M70 50 L80 60 M80 50 L70 60" stroke="#FF8C42" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <path d="M50 20 L60 30 M60 20 L50 30" stroke="#FF8C42" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <path d="M50 70 L60 80 M60 70 L50 80" stroke="#FF8C42" stroke-width="4" stroke-linecap="round" opacity="0.6"/>

  <!-- Thread curve -->
  <path d="M30 30 Q40 35 50 40 T70 50" stroke="#FF8C42" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4" stroke-dasharray="4 4"/>
</svg>
